const regionColors={
'Delhi':'#e74c3c',
'Vrindavan':'#3498db',
'Mohammadi':'#2ecc71',
'Saharanpur':'#f39c12',
'Meerut':'#9b59b6',
'Modi Nagar':'#8e44ad',
'Alwar':'#1abc9c',
'Karol Bagh':'#d35400',
'Munger':'#ff1493'
};

function getRegionColor(ngo){
 if(ngo.includes('Vrindavan')) return regionColors['Vrindavan'];
 if(ngo.includes('Mohammadi')) return regionColors['Mohammadi'];
 if(ngo.includes('Saharanpur')) return regionColors['Saharanpur'];
 if(ngo.includes('Meerut')) return regionColors['Meerut'];
 if(ngo.includes('Modi Nagar')) return regionColors['Modi Nagar'];
 if(ngo.includes('Alwar')) return regionColors['Alwar'];
 if(ngo.includes('Karol Bagh')) return regionColors['Karol Bagh'];
 if(ngo.includes('Munger')) return regionColors['Munger'];

 return regionColors['Delhi'];
}
